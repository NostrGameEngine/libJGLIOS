def libJGLIOSPlistRawValue = { File plist, String keyPath ->
    try {
        captureCommand(['plutil', '-extract', keyPath, 'raw', '-o', '-', plist.absolutePath])
    } catch (GradleException ignored) {
        null
    }
}

def libJGLIOSProvisioningProfileMatchesBundle = { File plist, String bundleId ->
    def applicationIdentifier = libJGLIOSPlistValue(plist, 'Entitlements:application-identifier')
    if (!applicationIdentifier) {
        return false
    }
    def appId = applicationIdentifier.toString()
    def suffix = appId.contains('.') ? appId.substring(appId.indexOf('.') + 1) : appId
    suffix == bundleId || suffix == '*'
}

def libJGLIOSProvisioningProfileMatchesType = { File plist, String signingType ->
    def getTaskAllow = libJGLIOSPlistRawValue(plist, 'Entitlements.get-task-allow')?.toString()?.toBoolean()
    def hasProvisionedDevices = libJGLIOSPlistValue(plist, 'ProvisionedDevices') != null
    signingType == 'release' ? (!getTaskAllow && !hasProvisionedDevices) : getTaskAllow
}

def libJGLIOSProvisioningProfileExpiration = { File plist ->
    def value = libJGLIOSPlistRawValue(plist, 'ExpirationDate')
    value ? Instant.parse(value.toString()) : Instant.EPOCH
}

def libJGLIOSMatchingProvisioningProfiles = { String signingType ->
    def bundleId = libJGLIOSBundleId()
    def profiles = []
    libJGLIOSProvisioningProfileDirs().each { dir ->
        dir.eachFileMatch(~/.*\.(mobileprovision|provisionprofile)/) { profile ->
            def plist = libJGLIOSProvisioningProfilePlist(profile)
            if (libJGLIOSProvisioningProfileMatchesBundle(plist, bundleId)
                    && libJGLIOSProvisioningProfileMatchesType(plist, signingType)) {
                profiles.add([
                    file: profile,
                    name: libJGLIOSPlistRawValue(plist, 'Name') ?: profile.name,
                    applicationIdentifier: libJGLIOSPlistValue(plist, 'Entitlements:application-identifier'),
                    expiration: libJGLIOSProvisioningProfileExpiration(plist)
                ])
            }
        }
    }
    profiles
}

def libJGLIOSValidLocalProvisioningProfile = { String signingType ->
    def profiles = libJGLIOSMatchingProvisioningProfiles(signingType)
    def validProfile = profiles
        .findAll { it.expiration.isAfter(Instant.now()) }
        .sort { -it.file.lastModified() }
        .find()
    validProfile
}

