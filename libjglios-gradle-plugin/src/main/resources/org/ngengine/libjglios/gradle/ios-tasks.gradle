def libJGLIOSRunCommandIgnoringFailure = { List<String> command ->
    try {
        captureCommand(command)
    } catch (GradleException ignored) {
        ''
    }
}

def libJGLIOSDetectedAppTarget = null
libJGLIOSIosAppRunTarget = {
    if (libJGLIOSDetectedAppTarget != null) {
        return libJGLIOSDetectedAppTarget
    }

    def requestedTarget = (findProperty('iosAppTarget')
        ?: providers.environmentVariable('IOS_APP_TARGET').orNull
        ?: 'auto').toString().trim().toLowerCase(Locale.ROOT)
    if (!['auto', 'device', 'simulator'].contains(requestedTarget)) {
        throw new GradleException("Unsupported iOS app target '${requestedTarget}'. Expected auto, device, or simulator.")
    }
    if (requestedTarget == 'simulator') {
        libJGLIOSDetectedAppTarget = [kind: 'simulator']
        return libJGLIOSDetectedAppTarget
    }

    def explicitDevice = (findProperty('iosDevice') ?: providers.environmentVariable('IOS_DEVICE').orNull)?.toString()?.trim()
    if (explicitDevice) {
        libJGLIOSDetectedAppTarget = [kind: 'device', identifier: explicitDevice, name: explicitDevice]
        return libJGLIOSDetectedAppTarget
    }

    def devicesJson = layout.buildDirectory.file('libjglios/devicectl/available-devices.json').get().asFile
    devicesJson.parentFile.mkdirs()
    delete devicesJson
    try {
        captureCommand([
            'xcrun',
            'devicectl',
            '--timeout', libJGLIOSIosDeviceCommandTimeoutSeconds(),
            'list',
            'devices',
            '--json-output', devicesJson.absolutePath
        ])
        def parsed = new JsonSlurper().parse(devicesJson)
        def devices = parsed?.result?.devices ?: []
        def device = devices.find {
            it?.hardwareProperties?.reality?.toString() == 'physical'
                && it?.hardwareProperties?.platform?.toString() == 'iOS'
        } ?: devices.find {
            it?.hardwareProperties?.platform?.toString() == 'iOS'
        }
        if (device != null) {
            def identifier = device.identifier?.toString()
                ?: device.hardwareProperties?.udid?.toString()
                ?: device.deviceProperties?.name?.toString()
            if (identifier) {
                libJGLIOSDetectedAppTarget = [
                    kind: 'device',
                    identifier: identifier,
                    name: device.deviceProperties?.name?.toString() ?: identifier
                ]
                return libJGLIOSDetectedAppTarget
            }
        }
    } catch (Exception exception) {
        if (requestedTarget == 'device') {
            throw new GradleException('Could not detect an available iOS device.', exception)
        }
        logger.info("Could not detect an available iOS device; falling back to simulator: ${exception.message}")
    }

    if (requestedTarget == 'device') {
        throw new GradleException('No available real iOS device found. Pass -PiosDevice=<UDID-or-name> to select one explicitly.')
    }

    libJGLIOSDetectedAppTarget = [kind: 'simulator']
    libJGLIOSDetectedAppTarget
}

def libJGLIOSRunIosAppOnSimulator = {
    def deviceName = providers.gradleProperty('iosSimulatorDevice').orElse(libJGLIOSSimulatorDevice()).get()
    def bundleId = libJGLIOSBundleId()
    def simulatorApp = graalSimulatorAppDir.get().asFile
    logger.lifecycle("Running iOS app on simulator ${deviceName}")
    libJGLIOSRunCommandIgnoringFailure(['xcrun', 'simctl', 'boot', deviceName])
    runCommand(['open', '-a', 'Simulator'])
    runCommand(['xcrun', 'simctl', 'bootstatus', deviceName, '-b'])
    libJGLIOSRunCommandIgnoringFailure(['xcrun', 'simctl', 'terminate', deviceName, bundleId])
    runCommand(['xcrun', 'simctl', 'install', deviceName, simulatorApp.absolutePath])
    runCommand(['xcrun', 'simctl', 'launch', deviceName, bundleId])
}

def libJGLIOSRunIosAppOnDevice = { Map target ->
    def bundleId = libJGLIOSBundleId()
    def deviceApp = graalDebugAppDir.get().asFile
    logger.lifecycle("Running iOS app on device ${target.name}")
    runCommand([
        'xcrun',
        'devicectl',
        '--timeout', libJGLIOSIosDeviceCommandTimeoutSeconds(),
        'device',
        'install',
        'app',
        '--device', target.identifier,
        deviceApp.absolutePath
    ])
    def launchWithConsole = libJGLIOSIosDeviceLaunchConsole()
    def launchArgs = ['xcrun', 'devicectl']
    if (!launchWithConsole) {
        launchArgs.addAll(['--timeout', libJGLIOSIosDeviceCommandTimeoutSeconds()])
    }
    launchArgs.addAll([
        'device',
        'process',
        'launch',
        '--terminate-existing',
        '--device', target.identifier
    ])
    if (launchWithConsole) {
        launchArgs.add('--console')
    }
    launchArgs.add(bundleId)
    if (launchWithConsole) {
        logger.lifecycle('Streaming iOS device console. Stop the Gradle task to detach while the app keeps running.')
        streamCommand(launchArgs)
    } else {
        runCommand(launchArgs)
    }
}

