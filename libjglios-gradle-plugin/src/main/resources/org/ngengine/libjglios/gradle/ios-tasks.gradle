def libJGLIOSSafeFileName = { File file, int index ->
    "${index}-${file.name.replaceAll('[^A-Za-z0-9_.-]', '_')}"
}

def libJGLIOSBool = { Object value, boolean fallback ->
    value == null ? fallback : value.toString().toBoolean()
}

def libJGLIOSFrameworkName = { File frameworkDir ->
    frameworkDir.name.endsWith('.framework') ? frameworkDir.name[0..-11] : frameworkDir.name
}

def libJGLIOSXcframeworkName = { File xcframeworkDir ->
    xcframeworkDir.name.endsWith('.xcframework') ? xcframeworkDir.name[0..-13] : xcframeworkDir.name
}

def libJGLIOSXcframeworkSortRank = { File xcframeworkDir ->
    [
        libJGLIOSCore: -50,
        libJGLIOSGLES: -40,
        libJGLIOSSdl3: -30,
        libJGLIOSOpenAL: -20,
        SDL3: 0,
        libEGL: 10,
        libGLESv2: 20,
        libfeature_support: 40
    ].get(libJGLIOSXcframeworkName(xcframeworkDir), 1000)
}

def libJGLIOSMapFrameworkDependency = { Object dependency ->
    if (dependency instanceof Map) {
        [
            name: dependency.name?.toString(),
            weak: libJGLIOSBool(dependency.weak, false)
        ]
    } else {
        [
            name: dependency.toString(),
            weak: false
        ]
    }
}

def libJGLIOSParseFrameworkMetadata = { File frameworkBundle ->
    def metadataFile = new File(frameworkBundle.parentFile, "${frameworkBundle.name}.json")
    if (!metadataFile.isFile()) {
        return [:]
    }
    def metadata = new JsonSlurper().parse(metadataFile)
    if (!(metadata instanceof Map)) {
        throw new GradleException("Invalid libJGLIOS iOS framework metadata next to ${frameworkBundle}: ${metadataFile}")
    }
    metadata
}

def libJGLIOSRuntimeIosRoots = { File extractionRoot ->
    def roots = []
    delete extractionRoot
    extractionRoot.mkdirs()

    sourceSets.main.runtimeClasspath.files.eachWithIndex { classpathFile, index ->
        if (classpathFile.isDirectory()) {
            def iosRoot = new File(classpathFile, libJGLIOSIosFrameworkResourcePrefix)
            if (iosRoot.exists()) {
                roots << iosRoot
            }
        } else if (classpathFile.exists()) {
            def lowerName = classpathFile.name.toLowerCase(Locale.ROOT)
            if (lowerName.endsWith('.jar') || lowerName.endsWith('.zip')) {
                def destination = new File(extractionRoot, libJGLIOSSafeFileName(classpathFile, index))
                copy {
                    from zipTree(classpathFile)
                    include "${libJGLIOSIosFrameworkResourcePrefix}/**"
                    into destination
                }
                def iosRoot = new File(destination, libJGLIOSIosFrameworkResourcePrefix)
                if (iosRoot.exists()) {
                    roots << iosRoot
                }
            }
        }
    }

    roots
}

def libJGLIOSBundledIosFrameworkRoots = {
    []
}

def libJGLIOSFindFrameworkBundles = { File root ->
    def frameworks = []
    if (!root.exists()) {
        return frameworks
    }
    if (root.isDirectory() && root.name.endsWith('.xcframework')) {
        frameworks << root
        return frameworks
    }
    root.eachDirRecurse { dir ->
        if (dir.name.endsWith('.xcframework')) {
            frameworks << dir
        }
    }
    frameworks.sort { left, right ->
        def rank = libJGLIOSXcframeworkSortRank(left) <=> libJGLIOSXcframeworkSortRank(right)
        rank == 0 ? left.absolutePath <=> right.absolutePath : rank
    }
}

def libJGLIOSSelectXcframeworkSlice = { File xcframework, String platform ->
    def childDirs = (xcframework.listFiles()?.findAll { it.isDirectory() } ?: [])
    def preferredNames = platform == 'simulator'
        ? ['ios-arm64_x86_64-simulator', 'ios-arm64-simulator']
        : ['ios-arm64']

    for (sliceName in preferredNames) {
        def sliceDir = childDirs.find { it.name == sliceName }
        if (sliceDir != null) {
            return sliceDir
        }
    }

    if (platform == 'simulator') {
        return childDirs.find { it.name.contains('simulator') }
    }
    childDirs.find { it.name.startsWith('ios-') && !it.name.contains('simulator') }
}

def libJGLIOSSelectFrameworkDir = { File frameworkBundle, String platform, String requestedName ->
    def sliceDir = libJGLIOSSelectXcframeworkSlice(frameworkBundle, platform)
    if (sliceDir == null) {
        return null
    }
    def frameworks = (sliceDir.listFiles()?.findAll { it.isDirectory() && it.name.endsWith('.framework') } ?: [])
    if (frameworks.isEmpty()) {
        return null
    }
    if (requestedName != null) {
        def requestedFramework = frameworks.find { libJGLIOSFrameworkName(it) == requestedName }
        if (requestedFramework != null) {
            return requestedFramework
        }
    }
    if (frameworks.size() == 1) {
        return frameworks.first()
    }
    throw new GradleException("Multiple frameworks found in ${sliceDir}; add ${frameworkBundle.name}.json next to ${frameworkBundle.name} to choose one.")
}

def libJGLIOSAddUniqueFrameworkSpec = { List specs, Map spec ->
    def existing = specs.find { it.name == spec.name }
    if (existing != null) {
        if (existing.frameworkDir.canonicalFile != spec.frameworkDir.canonicalFile) {
            throw new GradleException("Duplicate iOS framework '${spec.name}' found at ${existing.frameworkDir} and ${spec.frameworkDir}")
        }
        return
    }
    specs << spec
}

def libJGLIOSAddUniqueSystemFramework = { List frameworks, Object dependency ->
    def mapped = libJGLIOSMapFrameworkDependency(dependency)
    if (!mapped.name) {
        return
    }
    def existing = frameworks.find { it.name == mapped.name }
    if (existing == null) {
        frameworks << mapped
    } else if (mapped.weak) {
        existing.weak = true
    }
}

def libJGLIOSResolveIosFrameworks = { String platform, File appDir ->
    def extractionRoot = layout.buildDirectory.dir("libjglios/ios-framework-classpath/${platform}").get().asFile
    def frameworkRoots = []
    frameworkRoots.addAll(libJGLIOSRuntimeIosRoots(extractionRoot))
    frameworkRoots.addAll(libJGLIOSBundledIosFrameworkRoots())

    def systemFrameworks = []
    libJGLIOSDefaultSystemFrameworks.each { libJGLIOSAddUniqueSystemFramework(systemFrameworks, it) }

    def frameworkBundles = []
    frameworkRoots.each { root ->
        frameworkBundles.addAll(libJGLIOSFindFrameworkBundles(root))
    }
    frameworkBundles = frameworkBundles.unique { it.canonicalPath }

    def frameworkSpecs = []
    frameworkBundles.each { frameworkBundle ->
        def metadata = libJGLIOSParseFrameworkMetadata(frameworkBundle)
        (metadata.systemFrameworks ?: []).each { libJGLIOSAddUniqueSystemFramework(systemFrameworks, it) }
        def frameworkDir = libJGLIOSSelectFrameworkDir(frameworkBundle, platform, metadata.name?.toString())
        if (frameworkDir == null) {
            throw new GradleException("Could not find an iOS ${platform} framework slice in ${frameworkBundle}")
        }
        def spec = [
            name: metadata.name?.toString() ?: libJGLIOSFrameworkName(frameworkDir),
            frameworkDir: frameworkDir,
            link: libJGLIOSBool(metadata.link, true),
            embed: libJGLIOSBool(metadata.embed, true),
            forceLoad: libJGLIOSBool(metadata.forceLoad, false),
            weak: libJGLIOSBool(metadata.weak, false)
        ]
        libJGLIOSAddUniqueFrameworkSpec(frameworkSpecs, spec)
    }

    def linkFrameworksDir = layout.buildDirectory.dir("libjglios/ios-framework-link/${platform}").get().asFile
    delete linkFrameworksDir
    linkFrameworksDir.mkdirs()
    frameworkSpecs.each { spec ->
        copy {
            from spec.frameworkDir
            into new File(linkFrameworksDir, spec.frameworkDir.name)
        }
    }

    def frameworksDir = new File(appDir, 'Frameworks')
    delete frameworksDir
    frameworksDir.mkdirs()
    frameworkSpecs.findAll { it.embed }.each { spec ->
        copy {
            from spec.frameworkDir
            into new File(frameworksDir, spec.frameworkDir.name)
        }
    }

    [frameworksDir: linkFrameworksDir, embeddedFrameworksDir: frameworksDir, frameworks: frameworkSpecs, systemFrameworks: systemFrameworks]
}

def libJGLIOSFrameworkLinkArgs = { Map resolution ->
    def args = []
    resolution.frameworks.findAll { it.link }.each { framework ->
        if (framework.forceLoad) {
            args.add("-Wl,-force_load,${new File(framework.frameworkDir, framework.name).absolutePath}")
        } else {
            args.add(framework.weak ? '-weak_framework' : '-framework')
            args.add(framework.name)
        }
    }
    resolution.systemFrameworks.each { framework ->
        args.add(framework.weak ? '-weak_framework' : '-framework')
        args.add(framework.name)
    }
    args
}

def libJGLIOSExtension = {
    extensions.findByName('iOS') ?: extensions.findByName('libJGLIOS')
}

def libJGLIOSProjectProperty = { String name ->
    findProperty("iOS.${name}")
        ?: findProperty("ios.${name}")
        ?: findProperty("libJGLIOS.${name}")
        ?: findProperty("libjglios.${name}")
}

def libJGLIOSSetting = { String name, String fallback ->
    def extension = libJGLIOSExtension()
    if (extension != null && extension.hasProperty(name)) {
        def value = extension."${name}"
        if (value != null && value.respondsTo('getOrElse', Object)) {
            return value.getOrElse(fallback).toString()
        }
        if (value != null) {
            return value.toString()
        }
    }
    def projectValue = libJGLIOSProjectProperty(name)
    return (projectValue ?: fallback).toString()
}

def libJGLIOSRequiredSetting = { String name ->
    def extension = libJGLIOSExtension()
    if (extension != null && extension.hasProperty(name)) {
        def value = extension."${name}"
        if (value != null) {
            def resolved = null
            if (value.respondsTo('getOrNull')) {
                resolved = value.getOrNull()
            } else {
                resolved = value
            }
            if (resolved != null && resolved.toString().trim()) {
                return resolved.toString().trim()
            }
        }
    }
    def projectValue = libJGLIOSProjectProperty(name)
    if (projectValue != null && projectValue.toString().trim()) {
        return projectValue.toString().trim()
    }
    throw new GradleException("iOS.${name} is required.")
}

def libJGLIOSOptionalSetting = { String name ->
    def extension = libJGLIOSExtension()
    if (extension != null && extension.hasProperty(name)) {
        def value = extension."${name}"
        if (value != null) {
            def resolved = null
            if (value.respondsTo('getOrNull')) {
                resolved = value.getOrNull()
            } else {
                resolved = value
            }
            if (resolved != null && resolved.toString().trim()) {
                return resolved
            }
        }
    }
    def projectValue = libJGLIOSProjectProperty(name)
    if (projectValue != null && projectValue.toString().trim()) {
        return projectValue
    }
    null
}

