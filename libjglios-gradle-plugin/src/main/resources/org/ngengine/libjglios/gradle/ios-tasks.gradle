def libJGLIOSResource = { String path ->
    def pluginLoader = null
    try {
        pluginLoader = Class.forName('org.ngengine.libjglios.gradle.LibJGLIOSGradlePlugin').classLoader
    } catch (ClassNotFoundException ignored) {
        pluginLoader = null
    }
    def candidates = [
        getClass().classLoader,
        Thread.currentThread().contextClassLoader,
        buildscript.classLoader,
        pluginLoader
    ].findAll { it != null }
    for (loader in candidates) {
        def resource = loader.getResource(path)
        if (resource != null) {
            return resource
        }
    }
    return null
}

if (!tasks.names.contains('materializeLibJGLIOSNativeSources')) {
    tasks.register('materializeLibJGLIOSNativeSources') {
        group = 'iOS'
        description = 'Extracts bundled libJGLIOS native launcher/JNI sources from the Gradle plugin.'
        outputs.dir(libJGLIOSMaterializedNativeDir)
        outputs.upToDateWhen { false }
        onlyIf { libJGLIOSUseBundledNativeSources }
        doLast {
            def outDir = libJGLIOSMaterializedNativeDir.get().asFile
            delete outDir
            outDir.mkdirs()
            libJGLIOSNativeFiles.each { name ->
                def resource = libJGLIOSResource("${libJGLIOSNativeResourcePrefix}/${name}")
                if (resource == null) {
                    throw new GradleException("Missing bundled libJGLIOS native resource: ${name}")
                }
                new File(outDir, name).bytes = resource.bytes
            }
        }
    }
}

