def libJGLIOSOrientation = {
    def orientation = libJGLIOSSetting('orientation', 'landscape')
        .trim()
        .toLowerCase(Locale.ROOT)
        .replace('_', '-')
    if (orientation == 'force-portrait') {
        return 'portrait'
    }
    if (orientation == 'force-landscape') {
        return 'landscape'
    }
    if (!['portrait', 'landscape', 'auto'].contains(orientation)) {
        throw new GradleException("Unsupported libJGLIOS.orientation '${orientation}'. Expected portrait, landscape, or auto.")
    }
    orientation
}
def libJGLIOSInterfaceOrientations = {
    switch (libJGLIOSOrientation()) {
        case 'portrait':
            return ['UIInterfaceOrientationPortrait']
        case 'auto':
            return [
                'UIInterfaceOrientationPortrait',
                'UIInterfaceOrientationLandscapeLeft',
                'UIInterfaceOrientationLandscapeRight'
            ]
        default:
            return [
                'UIInterfaceOrientationLandscapeLeft',
                'UIInterfaceOrientationLandscapeRight'
            ]
    }
}
