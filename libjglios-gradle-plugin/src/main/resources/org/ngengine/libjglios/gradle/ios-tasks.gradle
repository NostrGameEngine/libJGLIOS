def captureCommand = { List<String> command, Map<String, String> environment = [:], File workingDirectory = null ->
    def normalizedCommand = command.collect { it.toString() }
    def processBuilder = new ProcessBuilder(normalizedCommand)
    processBuilder.redirectErrorStream(true)
    if (workingDirectory != null) {
        workingDirectory.mkdirs()
        processBuilder.directory(workingDirectory)
    }
    if (!environment.isEmpty()) {
        def normalizedEnvironment = environment.collectEntries { key, value ->
            [(key.toString()): value.toString()]
        }
        processBuilder.environment().putAll(normalizedEnvironment)
    }
    def process = processBuilder.start()
    def output = process.inputStream.getText('UTF-8')
    def exitCode = process.waitFor()
    if (exitCode != 0) {
        if (output.contains('Xcode license agreements') || output.contains('xcodebuild -license')) {
            throw new GradleException("""Command failed (${normalizedCommand.join(' ')}):
${output}
Xcode command line tools are blocked because the Xcode license has not been accepted.
Open Terminal and run:

  sudo xcodebuild -license accept

Then retry the Gradle task.""")
        }
        throw new GradleException("Command failed (${normalizedCommand.join(' ')}):\n${output}")
    }
    output.trim()
}

def streamCommand = { List<String> command, Map<String, String> environment = [:], File workingDirectory = null ->
    def normalizedCommand = command.collect { it.toString() }
    def processBuilder = new ProcessBuilder(normalizedCommand)
    processBuilder.redirectErrorStream(true)
    if (workingDirectory != null) {
        workingDirectory.mkdirs()
        processBuilder.directory(workingDirectory)
    }
    if (!environment.isEmpty()) {
        def normalizedEnvironment = environment.collectEntries { key, value ->
            [(key.toString()): value.toString()]
        }
        processBuilder.environment().putAll(normalizedEnvironment)
    }
    def process = processBuilder.start()
    def output = new StringBuilder()
    process.inputStream.withReader('UTF-8') { reader ->
        String line
        while ((line = reader.readLine()) != null) {
            output.append(line).append(System.lineSeparator())
            println line
        }
    }
    def exitCode = process.waitFor()
    if (exitCode != 0) {
        throw new GradleException("Command failed (${normalizedCommand.join(' ')}):\n${output}")
    }
    output.toString().trim()
}

def runCommand = { List<String> command, Map<String, String> environment = [:], File workingDirectory = null ->
    captureCommand(command, environment, workingDirectory)
}

