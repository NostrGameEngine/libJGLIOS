def libJGLIOSXcodeConfiguredTeamId = {
    def explicit = libJGLIOSTeamId()
    if (explicit) {
        return explicit
    }
    try {
        def output = captureCommand(['/usr/bin/defaults', 'read', 'com.apple.dt.Xcode', 'IDEProvisioningTeamByIdentifier'])
        def teamIds = output.readLines().collect { line ->
            def matcher = line =~ /teamID = ([A-Z0-9]+);/
            matcher.find() ? matcher.group(1) : null
        }.findAll { it != null }.unique()
        if (teamIds.size() == 1) {
            return teamIds[0]
        }
    } catch (GradleException ignored) {
        return null
    }
    null
}

