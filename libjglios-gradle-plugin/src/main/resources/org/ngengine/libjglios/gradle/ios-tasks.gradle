def libJGLIOSXcodeAutomaticProvisioningProfile = { String signingType ->
    if (!libJGLIOSXcodeProvisioningAutoCreate() || !libJGLIOSBundleIdAutoCreate()) {
        return null
    }
    def projectRoot = layout.buildDirectory.dir("libjglios/xcode-provisioning/${signingType}").get().asFile
    def xcodeProjectDir = libJGLIOSWriteXcodeProvisioningProbe(projectRoot, signingType)
    def configuration = signingType == 'release' ? 'Release' : 'Debug'
    def args = [
        'xcodebuild',
        '-project', xcodeProjectDir.absolutePath,
        '-scheme', 'LibJGLIOSProvisioningProbe',
        '-configuration', configuration,
        '-sdk', 'iphoneos',
        '-derivedDataPath', new File(projectRoot, 'DerivedData').absolutePath,
        '-allowProvisioningUpdates'
    ]
    if (signingType == 'debug') {
        args.add('-allowProvisioningDeviceRegistration')
        def target = libJGLIOSIosAppRunTarget()
        if (target.kind == 'device') {
            args.addAll(['-destination', "id=${target.identifier}"])
        } else {
            args.addAll(['-destination', 'generic/platform=iOS'])
        }
    } else {
        args.addAll(['-destination', 'generic/platform=iOS'])
    }
    args.add('build')
    logger.lifecycle("Resolving ${libJGLIOSProfileLabel(signingType)} provisioning with Xcode automatic signing.")
    try {
        runCommand(args)
    } catch (GradleException failure) {
        logger.lifecycle("""Xcode automatic provisioning did not resolve a ${libJGLIOSProfileLabel(signingType)} profile.
${failure.message}""")
        return null
    }
    libJGLIOSResolvedSigningIdentities.remove(signingType)
    libJGLIOSValidLocalProvisioningProfile(signingType)?.file?.absolutePath
}

def libJGLIOSProvisioningProfile = { String signingType ->
    if (libJGLIOSResolvedProvisioningProfiles.containsKey(signingType)) {
        return libJGLIOSResolvedProvisioningProfiles[signingType]
    }
    def explicit = libJGLIOSExplicitProvisioningProfile(signingType)
    if (explicit) {
        libJGLIOSResolvedProvisioningProfiles[signingType] = explicit
        return explicit
    }

    def validProfile = libJGLIOSValidLocalProvisioningProfile(signingType)
    def resolved = validProfile?.file?.absolutePath
        ?: libJGLIOSXcodeAutomaticProvisioningProfile(signingType)
    libJGLIOSResolvedProvisioningProfiles[signingType] = resolved
    resolved
}

def libJGLIOSEntitlements = { String signingType ->
    def explicit = libJGLIOSExplicitEntitlements(signingType)
    if (explicit) {
        return explicit
    }
    def provisioningProfilePath = libJGLIOSProvisioningProfile(signingType)
    if (!provisioningProfilePath) {
        return null
    }
    def profile = file(provisioningProfilePath)
    if (!profile.isFile()) {
        return null
    }
    def plist = libJGLIOSProvisioningProfilePlist(profile)
    def entitlements = layout.buildDirectory.file("libjglios/ios-${signingType}/Entitlements.plist").get().asFile
    entitlements.parentFile.mkdirs()
    entitlements.text = captureCommand(['/usr/libexec/PlistBuddy', '-x', '-c', 'Print:Entitlements', plist.absolutePath]) + System.lineSeparator()
    entitlements.absolutePath
}

def libJGLIOSValidateSigning = { String signingType ->
    def bundleId = libJGLIOSBundleId()
    def provisioningProfilePath = libJGLIOSProvisioningProfile(signingType)
    if (!provisioningProfilePath) {
        def expiredProfiles = libJGLIOSMatchingProvisioningProfiles(signingType)
            .findAll { !it.expiration.isAfter(Instant.now()) }
            .sort { -it.file.lastModified() }
        def expiredMessage = expiredProfiles.isEmpty()
            ? ''
            : "\nExpired matching profiles:\n" + expiredProfiles.collect {
                "  ${it.name} (${it.applicationIdentifier}) expired ${it.expiration}: ${it.file.absolutePath}"
            }.join('\n')
        def simulatorHint = signingType == 'debug' ? '\nUse -PiosAppTarget=simulator to run without device signing.' : ''
        throw new GradleException("""No valid ${libJGLIOSProfileLabel(signingType)} iOS provisioning profile was found for ${bundleId}.${expiredMessage}
Add your Apple ID in Xcode Settings > Accounts so libJGLIOS can use Xcode automatic signing, or pass -Pios${signingType == 'release' ? 'Release' : 'Debug'}ProvisioningProfile=/path/to/profile.mobileprovision.${simulatorHint}""")
    }

    def identity = libJGLIOSSigningIdentity(signingType)
    if (identity == null || !identity.sign) {
        def simulatorHint = signingType == 'debug' ? '\nUse -PiosAppTarget=simulator to run without device signing.' : ''
        throw new GradleException("""No ${libJGLIOSSigningKind(signingType)} signing identity was found for ${libJGLIOSProfileLabel(signingType)} iOS builds.
Open Xcode once and sign in with your Apple developer account, or pass -Pios${signingType == 'release' ? 'Release' : 'Debug'}SigningIdentity='<identity>'.${simulatorHint}""")
    }

    def provisioningProfile = file(provisioningProfilePath)
    if (!provisioningProfile.isFile()) {
        throw new GradleException("Configured iOS provisioning profile does not exist: ${provisioningProfile}")
    }
    def plist = libJGLIOSProvisioningProfilePlist(provisioningProfile)
    if (!libJGLIOSProvisioningProfileMatchesBundle(plist, bundleId)) {
        throw new GradleException("Configured iOS provisioning profile does not match bundle id ${bundleId}: ${provisioningProfile}")
    }
    if (!libJGLIOSProvisioningProfileMatchesType(plist, signingType)) {
        throw new GradleException("Configured iOS provisioning profile is not a ${libJGLIOSProfileLabel(signingType)} profile: ${provisioningProfile}")
    }
    def expiration = libJGLIOSProvisioningProfileExpiration(plist)
    if (!expiration.isAfter(Instant.now())) {
        def name = libJGLIOSPlistRawValue(plist, 'Name') ?: provisioningProfile.name
        def simulatorHint = signingType == 'debug' ? '\nUse -PiosAppTarget=simulator to run without device signing.' : ''
        throw new GradleException("""Configured iOS provisioning profile is expired: ${name}
Expired: ${expiration}
Path: ${provisioningProfile}
Add your Apple ID in Xcode Settings > Accounts so libJGLIOS can use Xcode automatic signing, or pass -Pios${signingType == 'release' ? 'Release' : 'Debug'}ProvisioningProfile=/path/to/profile.mobileprovision.${simulatorHint}""")
    }
}

def libJGLIOSGenerateWeakJniStubs = { File archiveFile, File outputFile ->
    def output = captureCommand(['xcrun', 'nm', '-u', archiveFile.absolutePath])
    def symbols = output.readLines()
        .collect { it.trim().tokenize(' ').last() }
        .findAll { it.startsWith('_Java_') || it.startsWith('_JNI_OnLoad_') }
        .collect { it.substring(1) }
        .unique()
        .sort()

    outputFile.parentFile.mkdirs()
    if (symbols.isEmpty()) {
        outputFile.text = '/* No JNI stubs required. */\n'
        return outputFile
    }

    outputFile.text = """#include <stdint.h>

#ifdef __cplusplus
extern "C" {
#endif

${symbols.collect { "__attribute__((weak)) intptr_t ${it}(...) { return 0; }" }.join('\n')}

#ifdef __cplusplus
}
#endif
"""
    println "Generated ${symbols.size()} weak JNI link stubs: ${outputFile.absolutePath}"
    outputFile
}

def resolveNativeImageBinary = { File graalHome ->
    def launcher = new File(graalHome, 'bin/native-image')
    def svmBinary = new File(graalHome, 'lib/svm/bin/native-image')
    if (launcher.exists()) {
        def launcherText = launcher.isFile() ? launcher.text : ''
        if (launcherText.startsWith('#!') || !svmBinary.exists()) {
            return launcher
        }
    }
    return svmBinary.exists() ? svmBinary : launcher
}

def resolvePathNativeImage = {
    def binary = captureCommand(['bash', '-lc', 'command -v native-image || true'])
    if (!binary) {
        return null
    }
    def nativeImage = file(binary)
    if (!nativeImage.exists()) {
        return null
    }
    def parent = nativeImage.parentFile?.parentFile
    if (parent?.name == 'Home' && parent.parentFile?.name == 'Contents') {
        return [home: parent, nativeImage: nativeImage, source: 'PATH']
    }
    return [home: parent, nativeImage: nativeImage, source: 'PATH']
}

def resolveIosGraalVm = {
    def candidates = [
        [value: findProperty('iosGraalVmHome'), source: '-PiosGraalVmHome'],
        [value: providers.environmentVariable('IOS_GRAALVM_HOME').orNull, source: 'IOS_GRAALVM_HOME'],
        [value: findProperty('graalvmHome'), source: '-PgraalvmHome'],
        [value: providers.environmentVariable('GRAALVM_HOME').orNull, source: 'GRAALVM_HOME']
    ]

    for (candidate in candidates) {
        if (!candidate.value) {
            continue
        }
        def home = file(candidate.value)
        def nativeImage = resolveNativeImageBinary(home)
        if (!nativeImage.exists()) {
            throw new GradleException("Configured GraalVM home from ${candidate.source} does not contain bin/native-image: ${home}")
        }
        return [home: home, nativeImage: nativeImage, source: candidate.source]
    }

    if (graalHostMarkerFile.exists()) {
        def preparedHome = file(graalHostMarkerFile.text.trim())
        def nativeImage = resolveNativeImageBinary(preparedHome)
        if (nativeImage.exists()) {
            return [home: preparedHome, nativeImage: nativeImage, source: graalHostMarkerFile.absolutePath]
        }
        nativeImage = resolveNativeImageBinary(graalHostVendorDir)
        if (nativeImage.exists()) {
            return [home: graalHostVendorDir, nativeImage: nativeImage, source: graalHostMarkerFile.absolutePath]
        }
    }

    if ((findProperty('allowPathNativeImageForIos') ?: 'false').toString().toBoolean()) {
        def pathResolution = resolvePathNativeImage()
        if (pathResolution != null) {
            return pathResolution
        }
    }

    throw new GradleException(
        'Could not resolve the host iOS GraalVM/native-image. Set -PiosGraalVmHome=..., IOS_GRAALVM_HOME, ' +
        '-PgraalvmHome=..., GRAALVM_HOME, or run :libjglios-gradle-plugin:prepareGraalHostNik. ' +
        'PATH lookup is disabled unless -PallowPathNativeImageForIos=true is set.'
    )
}

def graalSdkJars = files({
    def hostHome = graalHostMarkerFile.exists() ? file(graalHostMarkerFile.text.trim()) : graalHostVendorDir
    return fileTree(hostHome) {
        include 'lib/**/*.jar'
        include 'jre/lib/**/*.jar'
    }
})

dependencies {
    compileOnly graalSdkJars
}

tasks.named('compileJava') {
    dependsOn libJGLIOSProviderTask('prepareGraalHostNik')
    doFirst {
        def resolved = resolveIosGraalVm()
        def jmodsDir = new File(resolved.home, 'jmods')
        if (!new File(jmodsDir, 'org.graalvm.nativeimage.jmod').exists()) {
            throw new GradleException("Missing org.graalvm.nativeimage.jmod in host Graal home: ${jmodsDir}")
        }
        options.compilerArgs += ['--module-path', jmodsDir.absolutePath, '--add-modules', 'org.graalvm.nativeimage']
    }
}

