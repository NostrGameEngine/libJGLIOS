def libJGLIOSProvisioningProfilePlist = { File profile ->
    def outputDir = layout.buildDirectory.dir('libjglios/provisioning-profiles').get().asFile
    outputDir.mkdirs()
    def plist = new File(outputDir, profile.name.replaceAll('[^A-Za-z0-9_.-]', '_') + '.plist')
    plist.text = captureCommand(['security', 'cms', '-D', '-i', profile.absolutePath]) + System.lineSeparator()
    plist
}

def libJGLIOSPlistValue = { File plist, String keyPath ->
    try {
        captureCommand(['/usr/libexec/PlistBuddy', '-c', "Print:${keyPath}", plist.absolutePath])
    } catch (GradleException ignored) {
        null
    }
}

def libJGLIOSProvisioningProfileMatchesBundle = { File profile, String bundleId ->
    def plist = libJGLIOSProvisioningProfilePlist(profile)
    def applicationIdentifier = libJGLIOSPlistValue(plist, 'Entitlements:application-identifier')
    if (!applicationIdentifier) {
        return false
    }
    def appId = applicationIdentifier.toString()
    def suffix = appId.contains('.') ? appId.substring(appId.indexOf('.') + 1) : appId
    suffix == bundleId || suffix == '*'
}

libJGLIOSAutoIosDeviceProvisioningProfile = {
    def bundleId = libJGLIOSBundleId()
    def profiles = []
    libJGLIOSProvisioningProfileDirs().each { dir ->
        dir.eachFileMatch(~/.*\.(mobileprovision|provisionprofile)/) { profile ->
            if (libJGLIOSProvisioningProfileMatchesBundle(profile, bundleId)) {
                profiles.add(profile)
            }
        }
    }
    def profile = profiles.sort { -it.lastModified() }.find()
    profile?.absolutePath
}

libJGLIOSAutoIosDeviceEntitlements = {
    def provisioningProfilePath = libJGLIOSIosDeviceProvisioningProfile()
    if (!provisioningProfilePath) {
        return null
    }
    def profile = file(provisioningProfilePath)
    if (!profile.isFile()) {
        return null
    }
    def plist = libJGLIOSProvisioningProfilePlist(profile)
    def entitlements = layout.buildDirectory.file('libjglios/ios-device/Entitlements.plist').get().asFile
    entitlements.parentFile.mkdirs()
    entitlements.text = captureCommand(['/usr/libexec/PlistBuddy', '-x', '-c', 'Print:Entitlements', plist.absolutePath]) + System.lineSeparator()
    entitlements.absolutePath
}

def libJGLIOSGenerateWeakJniStubs = { File archiveFile, File outputFile ->
    def output = captureCommand(['xcrun', 'nm', '-u', archiveFile.absolutePath])
    def symbols = output.readLines()
        .collect { it.trim().tokenize(' ').last() }
        .findAll { it.startsWith('_Java_') || it.startsWith('_JNI_OnLoad_') }
        .collect { it.substring(1) }
        .unique()
        .sort()

    outputFile.parentFile.mkdirs()
    if (symbols.isEmpty()) {
        outputFile.text = '/* No JNI stubs required. */\n'
        return outputFile
    }

    outputFile.text = """#include <stdint.h>

#ifdef __cplusplus
extern "C" {
#endif

${symbols.collect { "__attribute__((weak)) intptr_t ${it}(...) { return 0; }" }.join('\n')}

#ifdef __cplusplus
}
#endif
"""
    println "Generated ${symbols.size()} weak JNI link stubs: ${outputFile.absolutePath}"
    outputFile
}

def resolveNativeImageBinary = { File graalHome ->
    def launcher = new File(graalHome, 'bin/native-image')
    def svmBinary = new File(graalHome, 'lib/svm/bin/native-image')
    if (launcher.exists()) {
        def launcherText = launcher.isFile() ? launcher.text : ''
        if (launcherText.startsWith('#!') || !svmBinary.exists()) {
            return launcher
        }
    }
    return svmBinary.exists() ? svmBinary : launcher
}

def resolvePathNativeImage = {
    def binary = captureCommand(['bash', '-lc', 'command -v native-image || true'])
    if (!binary) {
        return null
    }
    def nativeImage = file(binary)
    if (!nativeImage.exists()) {
        return null
    }
    def parent = nativeImage.parentFile?.parentFile
    if (parent?.name == 'Home' && parent.parentFile?.name == 'Contents') {
        return [home: parent, nativeImage: nativeImage, source: 'PATH']
    }
    return [home: parent, nativeImage: nativeImage, source: 'PATH']
}

def resolveIosGraalVm = {
    def candidates = [
        [value: findProperty('iosGraalVmHome'), source: '-PiosGraalVmHome'],
        [value: providers.environmentVariable('IOS_GRAALVM_HOME').orNull, source: 'IOS_GRAALVM_HOME'],
        [value: findProperty('graalvmHome'), source: '-PgraalvmHome'],
        [value: providers.environmentVariable('GRAALVM_HOME').orNull, source: 'GRAALVM_HOME']
    ]

    for (candidate in candidates) {
        if (!candidate.value) {
            continue
        }
        def home = file(candidate.value)
        def nativeImage = resolveNativeImageBinary(home)
        if (!nativeImage.exists()) {
            throw new GradleException("Configured GraalVM home from ${candidate.source} does not contain bin/native-image: ${home}")
        }
        return [home: home, nativeImage: nativeImage, source: candidate.source]
    }

    if (graalHostMarkerFile.exists()) {
        def preparedHome = file(graalHostMarkerFile.text.trim())
        def nativeImage = resolveNativeImageBinary(preparedHome)
        if (nativeImage.exists()) {
            return [home: preparedHome, nativeImage: nativeImage, source: graalHostMarkerFile.absolutePath]
        }
        nativeImage = resolveNativeImageBinary(graalHostVendorDir)
        if (nativeImage.exists()) {
            return [home: graalHostVendorDir, nativeImage: nativeImage, source: graalHostMarkerFile.absolutePath]
        }
    }

    if ((findProperty('allowPathNativeImageForIos') ?: 'false').toString().toBoolean()) {
        def pathResolution = resolvePathNativeImage()
        if (pathResolution != null) {
            return pathResolution
        }
    }

    throw new GradleException(
        'Could not resolve the host iOS GraalVM/native-image. Set -PiosGraalVmHome=..., IOS_GRAALVM_HOME, ' +
        '-PgraalvmHome=..., GRAALVM_HOME, or run :libjglios-gradle-plugin:prepareGraalHostNik. ' +
        'PATH lookup is disabled unless -PallowPathNativeImageForIos=true is set.'
    )
}

