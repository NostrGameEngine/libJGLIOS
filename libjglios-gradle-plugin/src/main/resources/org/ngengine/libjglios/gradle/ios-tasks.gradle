def libJGLIOSAppIconSource = {
    def value = libJGLIOSOptionalSetting('appIcon')
    if (value == null) {
        return null
    }
    def icon = value instanceof File ? value : file(value.toString())
    def lowerName = icon.name.toLowerCase(Locale.ROOT)
    if (icon.isFile() && lowerName.endsWith('.png')) {
        return [type: 'png', file: icon]
    }
    if (icon.isDirectory() && lowerName.endsWith('.xcassets')) {
        return [type: 'xcassets', file: icon]
    }
    throw new GradleException(
        "Unsupported libJGLIOS.appIcon '${icon}'. Expected a PNG file or an Assets.xcassets directory."
    )
}
def libJGLIOSAppIconInputFiles = {
    def source = libJGLIOSAppIconSource()
    if (source == null) {
        return files()
    }
    source.type == 'xcassets' ? fileTree(source.file) : files(source.file)
}
def libJGLIOSGeneratedAppIconCatalog = { File sourcePng ->
    def catalogDir = new File(graalAppIconBuildDir.get().asFile, 'Assets.xcassets')
    def appIconDir = new File(catalogDir, 'AppIcon.appiconset')
    delete catalogDir
    appIconDir.mkdirs()
    def images = libJGLIOSAppIconImages.collect { spec ->
        def filename = "AppIcon-${spec.idiom}-${spec.size}-${spec.scale}.png".replaceAll('[^A-Za-z0-9_.-]', '-')
        def output = new File(appIconDir, filename)
        runCommand([
            '/usr/bin/sips',
            '-s', 'format', 'png',
            '-z', spec.pixels.toString(), spec.pixels.toString(),
            sourcePng.absolutePath,
            '--out', output.absolutePath
        ])
        [
            idiom: spec.idiom,
            size: spec.size,
            scale: spec.scale,
            filename: filename
        ]
    }
    new File(appIconDir, 'Contents.json').text = JsonOutput.prettyPrint(JsonOutput.toJson([
        images: images,
        info: [
            version: 1,
            author: 'libJGLIOS'
        ]
    ])) + System.lineSeparator()
    catalogDir
}
def libJGLIOSCompileAppIcon = { File appDir, String platform, File infoPlist ->
    def source = libJGLIOSAppIconSource()
    if (source == null) {
        return
    }
    def catalogDir = source.type == 'png' ? libJGLIOSGeneratedAppIconCatalog(source.file) : source.file
    def partialInfoPlist = new File(graalAppIconBuildDir.get().asFile, "${platform}-AppIcon-PartialInfo.plist")
    delete partialInfoPlist
    runCommand([
        'xcrun', 'actool',
        catalogDir.absolutePath,
        '--compile', appDir.absolutePath,
        '--platform', platform,
        '--minimum-deployment-target', libJGLIOSMinIosVersion(),
        '--target-device', 'iphone',
        '--target-device', 'ipad',
        '--app-icon', 'AppIcon',
        '--output-partial-info-plist', partialInfoPlist.absolutePath
    ])
    if (!partialInfoPlist.isFile()) {
        throw new GradleException("actool did not create the iOS app icon partial Info.plist: ${partialInfoPlist}")
    }
    runCommand(['/usr/libexec/PlistBuddy', '-c', "Merge ${partialInfoPlist.absolutePath}", infoPlist.absolutePath])
    println "Compiled iOS app icon from ${source.file.absolutePath}"
}

def libJGLIOSAssetsInputFiles = {
    def assetFiles = files()
    def extension = libJGLIOSExtension()
    if (extension != null && extension.hasProperty('assets')) {
        def assets = extension.assets
        if (assets != null) {
            assetFiles.from(assets)
        }
    }
    def projectAssets = libJGLIOSProjectProperty('assets')
    if (projectAssets != null && projectAssets.toString().trim()) {
        projectAssets.toString()
            .split(',')
            .collect { it.trim() }
            .findAll { it }
            .each { assetFiles.from(file(it)) }
    }
    assetFiles
}
def libJGLIOSAssetManifestFile = { File appDir ->
    def manifestDir = layout.buildDirectory.dir('libjglios/asset-manifests').get().asFile
    new File(manifestDir, appDir.name.replaceAll('[^A-Za-z0-9_.-]', '_') + '.txt')
}
def libJGLIOSReservedBundleAssetNames = {
    def names = [
        'Info.plist',
        'PkgInfo',
        'Frameworks',
        'PlugIns',
        'Watch',
        '_CodeSignature',
        'SC_Info',
        'Assets.car',
        'embedded.mobileprovision'
    ] as LinkedHashSet<String>
    try {
        names << libJGLIOSExecutableName(libJGLIOSAppName())
    } catch (Throwable ignored) {
    }
    names
}
def libJGLIOSCopyAssets = { File appDir ->
    def assets = libJGLIOSAssetsInputFiles()
    def manifest = libJGLIOSAssetManifestFile(appDir)
    def previousAssetNames = manifest.isFile()
        ? manifest.readLines('UTF-8').collect { it.trim() }.findAll { it } as LinkedHashSet<String>
        : [] as LinkedHashSet<String>
    def assetPaths = assets.files
    def currentAssetNames = [] as LinkedHashSet<String>
    assetPaths.each { assetPath ->
        if (!assetPath.exists()) {
            throw new GradleException("Configured iOS asset path does not exist: ${assetPath}")
        }
        if (assetPath.isDirectory()) {
            assetPath.listFiles()?.sort { it.name }?.each { child ->
                currentAssetNames << child.name
            }
        } else if (assetPath.isFile()) {
            currentAssetNames << assetPath.name
        }
    }

    def reservedNames = libJGLIOSReservedBundleAssetNames()
    def reservedCollisions = currentAssetNames.findAll { reservedNames.contains(it) }.sort()
    if (!reservedCollisions.isEmpty()) {
        throw new GradleException("Configured iOS assets conflict with generated app bundle item(s): ${reservedCollisions.join(', ')}")
    }

    (previousAssetNames + currentAssetNames).each { assetName ->
        delete new File(appDir, assetName)
    }
    if (assetPaths.isEmpty()) {
        delete manifest
        return
    }
    assetPaths.each { assetPath ->
        copy {
            from assetPath
            into appDir
        }
    }
    manifest.parentFile.mkdirs()
    manifest.text = currentAssetNames.sort().join(System.lineSeparator()) + System.lineSeparator()
    println "Copied ${assetPaths.size()} iOS asset path(s) into ${appDir.absolutePath}"
}
def libJGLIOSAssetExcludeResourcesPattern = {
    def assets = libJGLIOSAssetsInputFiles()
    if (assets.isEmpty()) {
        return null
    }
    def excludes = [] as LinkedHashSet<String>
    assets.files.each { assetPath ->
        if (!assetPath.exists()) {
            return
        }
        if (assetPath.isDirectory()) {
            assetPath.eachFileRecurse(FileType.FILES) { assetFile ->
                def relativePath = assetPath.toPath().relativize(assetFile.toPath()).toString()
                    .replace(File.separatorChar, '/' as char)
                if (relativePath) {
                    excludes << java.util.regex.Pattern.quote(relativePath)
                }
            }
        } else if (assetPath.isFile()) {
            excludes << java.util.regex.Pattern.quote(assetPath.name)
        }
    }
    excludes.isEmpty() ? null : excludes.join('|')
}

