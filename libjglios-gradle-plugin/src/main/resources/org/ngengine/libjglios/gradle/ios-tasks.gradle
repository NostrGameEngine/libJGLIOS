    inputs.property('iosDebugProvisioningProfile', providers.provider { libJGLIOSProvisioningProfile('debug') ?: '' })
    inputs.property('iosDebugCodesignEntitlements', providers.provider { libJGLIOSEntitlements('debug') ?: '' })
    outputs.dir(graalDebugAppDir)

    doLast {
        def appDir = graalDebugAppDir.get().asFile
        libJGLIOSCopyLinkedDeviceApp(appDir)
        libJGLIOSSignAppBundle(appDir, 'debug')
