tasks.register('buildUsercode') {
    group = 'build'
    description = 'Builds the relocatable Graal iOS app usercode image using BellSoft Liberica NIK.'
    dependsOn 'classes',
        libJGLIOSNativeImageMetadataTasks,
        libJGLIOSProviderTask('prepareGraalJdkIphoneosArm64'),
        libJGLIOSProviderTask('prepareGraalHostNik')
    inputs.files(sourceSets.main.runtimeClasspath, graalHostVendorDir, graalDeviceRuntimeDir, { libJGLIOSAssetsInputFiles() })
    inputs.property('includeResourceExtensions', providers.provider { libJGLIOSIncludeResourceExtensions().join(',') })
    outputs.dir(graalDeviceLibDir)

    doLast {
        def resolved = resolveIosGraalVm()
        def libDir = graalDeviceLibDir.get().asFile
        delete libDir
        libDir.mkdirs()

        def nativeImageVersion = captureCommand([resolved.nativeImage.absolutePath, '--version'])
        if (!nativeImageVersion.contains('Liberica-NIK-23.1.3')) {
            throw new GradleException("Unexpected native-image distribution for iOS build:\n${nativeImageVersion}")
        }

        def sdkPath = libJGLIOSXcrun(['--sdk', 'iphoneos', '--show-sdk-path'])
        def clangPath = libJGLIOSXcrun(['--sdk', 'iphoneos', '--find', 'clang'])
        def clangxxPath = libJGLIOSXcrun(['--sdk', 'iphoneos', '--find', 'clang++'])

        println "native-image executable path: ${resolved.nativeImage.absolutePath}"
        println "native-image --version: ${nativeImageVersion}"
        println 'selected target: iphoneos-arm64'
        println "CAP cache dir: ${graalDeviceCapDir.absolutePath}"
        println "libjava path: ${graalDeviceLibJava.absolutePath}"
        println "libjvm path: ${graalDeviceLibJvm.absolutePath}"
        println "iOS SDK path: ${sdkPath}"
        println "clang path: ${clangxxPath}"
        println "Apple target triple: ${libJGLIOSDeviceTargetTriple()}"

        def enableMonitoring = (findProperty('iosGraalEnableMonitoring') ?: 'true').toString().toBoolean()
        def limitModules = findProperty('iosGraalLimitModules')?.toString()?.trim()
        def includeResources = (findProperty('iosGraalIncludeResources')
            ?: libJGLIOSDefaultIncludeResourcesPattern()).toString().trim()
        def excludeResources = libJGLIOSAssetExcludeResourcesPattern()

        def args = [
            resolved.nativeImage.absolutePath,
            '-cp', sourceSets.main.runtimeClasspath.asPath,
            '--no-server',
            '-R:-UsePerfData',
            '-H:+ExitAfterRelocatableImageWrite',
            '-H:+SharedLibrary',
            "-H:TempDirectory=${libDir.absolutePath}",
            '-H:Name=usercode',
            '-H:+AddAllCharsets',
            '-H:-DeadlockWatchdogExitOnTimeout',
            '-H:DeadlockWatchdogInterval=0',
            '-H:+RemoveSaturatedTypeFlows',
            '-H:-SpawnIsolates',
            '-H:PageSize=16384',
            '-H:EnableURLProtocols=http,https,jar',
            '-H:+PrintAnalysisCallTree',
            '-H:Log=registerResource:',
            '-Djdk.internal.lambda.eagerlyInitialize=false',
            '-H:+ReportExceptionStackTraces',
            '-Dsvm.targetName=iOS',
            '-Dsvm.targetArch=arm64',
            '-H:CompilerBackend=lir',
            '-Dsvm.platform=org.graalvm.nativeimage.Platform$IOS_AARCH64',
            '--no-fallback',
            libJGLIOSMainClass()
        ]

        if (enableMonitoring) {
            args.add(args.size() - 1, '--enable-monitoring=heapdump,jfr')
        }
        if (limitModules) {
            args.add(args.size() - 1, "--limit-modules=${limitModules}")
        }
        if (includeResources) {
            args.add(args.size() - 1, "-H:IncludeResources=${includeResources}")
        }
        if (excludeResources) {
            args.add(args.size() - 1, "-H:ExcludeResources=${excludeResources}")
        }

        def argsWithCap = new ArrayList<String>(args)
        argsWithCap.add('-H:+UseCAPCache')
        argsWithCap.add("-H:CAPCacheDir=${graalDeviceCapDir.absolutePath}")
        def environment = [SDKROOT: sdkPath, CC: clangPath, CXX: clangxxPath]
        try {
            runCommand(argsWithCap, environment, libDir)
        } catch (GradleException capFailure) {
            if (!capFailure.message.contains('Missing CAP cache value for:')) {
                throw capFailure
            }
            logger.warn('Device CAP cache mismatch detected; retrying native-image without CAP cache.')
            runCommand(args, environment, libDir)
        }
    }
}

