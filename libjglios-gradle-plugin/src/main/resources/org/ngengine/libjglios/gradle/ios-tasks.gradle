libJGLIOSAutoIosDeviceSigningIdentity = {
    def output = ''
    try {
        output = captureCommand(['security', 'find-identity', '-v', '-p', 'codesigning'])
    } catch (GradleException ignored) {
        return null
    }
    def line = output.readLines().find { it.contains('"Apple Development:') }
    if (line == null) {
        return null
    }
    def matcher = line =~ /"([^"]+)"/
    matcher.find() ? matcher.group(1) : null
}

