def libJGLIOSNormalizeResourceExtension = { Object extension ->
    def value = extension?.toString()?.trim()
    if (!value) {
        return null
    }
    if (value.startsWith('.')) {
        value = value.substring(1)
    }
    value = value.trim().toLowerCase(Locale.ROOT)
    if (!value) {
        return null
    }
    if (!(value ==~ /[a-z0-9][a-z0-9_+-]*/)) {
        throw new GradleException("Invalid iOS native-image resource extension '${extension}'. Use values like 'svg' or '.svg'.")
    }
    value
}

def libJGLIOSExtraIncludeResourceExtensions = {
    def extensions = [] as List<Object>
    def extension = libJGLIOSExtension()
    if (extension != null && extension.hasProperty('includeResourceExtensions')) {
        def value = extension.includeResourceExtensions
        if (value != null) {
            def resolved = null
            if (value.respondsTo('getOrElse', Object)) {
                resolved = value.getOrElse([])
            } else if (value.respondsTo('getOrNull')) {
                resolved = value.getOrNull()
            } else {
                resolved = value
            }
            if (resolved instanceof Iterable) {
                extensions.addAll(resolved)
            } else if (resolved != null) {
                extensions << resolved
            }
        }
    }

    def projectValue = libJGLIOSProjectProperty('includeResourceExtensions')
    if (projectValue != null && projectValue.toString().trim()) {
        extensions.addAll(projectValue.toString().split(',').collect { it.trim() }.findAll { it })
    }

    extensions.collect { libJGLIOSNormalizeResourceExtension(it) }.findAll { it }
}

def libJGLIOSIncludeResourceExtensions = {
    def extensions = [] as LinkedHashSet<String>
    extensions.addAll(libJGLIOSDefaultIncludeResourceExtensions)
    extensions.addAll(libJGLIOSExtraIncludeResourceExtensions())
    extensions
}

def libJGLIOSDefaultIncludeResourcesPattern = {
    "(?i).*[.](${libJGLIOSIncludeResourceExtensions().collect { java.util.regex.Pattern.quote(it) }.join('|')})\$"
}

def libJGLIOSXcrun = { List<String> args ->
    captureCommand(['xcrun'] + args)
}

def libJGLIOSAutoSigningIdentity = { String signingType ->
    def output = ''
    try {
        output = captureCommand(['security', 'find-identity', '-v', '-p', 'codesigning'])
    } catch (GradleException ignored) {
        return null
    }
    def wantedKind = libJGLIOSSigningKind(signingType)
    def line = output.readLines().find { it.contains("\"${wantedKind}") }
    if (line == null) {
        return null
    }
    def hashMatcher = line =~ /^\s*\d+\)\s+([A-Fa-f0-9]+)\s+/
    def hash = hashMatcher.find() ? hashMatcher.group(1) : null
    def matcher = line =~ /"([^"]+)"/
    def name = matcher.find() ? matcher.group(1) : null
    hash == null && name == null ? null : [sign: hash ?: name, name: name ?: hash]
}

def libJGLIOSSigningIdentity = { String signingType ->
    if (libJGLIOSResolvedSigningIdentities.containsKey(signingType)) {
        return libJGLIOSResolvedSigningIdentities[signingType]
    }
    def explicit = libJGLIOSExplicitSigningIdentity(signingType)
    def identity = explicit ? [sign: explicit, name: explicit] : libJGLIOSAutoSigningIdentity(signingType)
    libJGLIOSResolvedSigningIdentities[signingType] = identity
    identity
}

