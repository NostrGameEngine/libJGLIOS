tasks.register('buildIosSimulatorUsercode') {
    group = 'build'
    description = 'Builds the relocatable Graal iOS simulator usercode image using BellSoft Liberica NIK.'
    dependsOn 'classes', libJGLIOSProviderTask('prepareGraalHostNik'), libJGLIOSProviderTask('prepareGraalJdkIphonesimulatorArm64')
    inputs.files(sourceSets.main.runtimeClasspath, graalHostVendorDir, graalSimulatorRuntimeDir)
    outputs.dir(graalSimulatorLibDir)

    doLast {
        def resolved = resolveIosGraalVm()
        def libDir = graalSimulatorLibDir.get().asFile
        delete libDir
        libDir.mkdirs()

        def nativeImageVersion = captureCommand([resolved.nativeImage.absolutePath, '--version'])
        if (!nativeImageVersion.contains('Liberica-NIK-23.1.3')) {
            throw new GradleException(
                "Unexpected native-image distribution for iOS build. Expected Liberica-NIK-23.1.3 but got:\n${nativeImageVersion}\n" +
                "Resolved from: ${resolved.source}\nBinary: ${resolved.nativeImage.absolutePath}"
            )
        }

        def sdkPath = libJGLIOSXcrun(['--sdk', 'iphonesimulator', '--show-sdk-path'])
        def clangPath = libJGLIOSXcrun(['--sdk', 'iphonesimulator', '--find', 'clang'])
        def clangxxPath = libJGLIOSXcrun(['--sdk', 'iphonesimulator', '--find', 'clang++'])

        println "native-image executable path: ${resolved.nativeImage.absolutePath}"
        println "native-image --version: ${nativeImageVersion}"
        println 'selected target: iphonesimulator-arm64'
        println "CAP cache dir: ${graalSimulatorCapDir.absolutePath}"
        println "libjava path: ${graalSimulatorLibJava.absolutePath}"
        println "libjvm path: ${graalSimulatorLibJvm.absolutePath}"
        println "iOS SDK path: ${sdkPath}"
        println "clang path: ${clangxxPath}"
        println "Apple target triple: ${libJGLIOSSimulatorTargetTriple()}"

        def useCapCache = (findProperty('iosGraalUseCapCache') ?: 'true').toString().toBoolean()
        def enableMonitoring = (findProperty('iosGraalEnableMonitoring') ?: 'true').toString().toBoolean()
        def limitModules = findProperty('iosGraalLimitModules')?.toString()?.trim()
        def includeResources = (findProperty('iosGraalIncludeResources')
            ?: '(?i).*[.](cfg|properties|fnt|png|jpg|jpeg|bmp|gif|tga|hdr|pfm|dds|ktx|j3m|j3md|j3sn|j3o|j3f|j3odata|vert|frag|geom|tsctrl|tseval|glsl|glsllib|comp|obj|mtl|meshxml|skeletonxml|scene|material|gltf|glb|bin|ogg|wav|xml|txt|cl|clh)$').toString().trim()

        def args = [
            resolved.nativeImage.absolutePath,
            '-cp', sourceSets.main.runtimeClasspath.asPath,
            '--no-server',
            '-R:-UsePerfData',
            '-H:+ExitAfterRelocatableImageWrite',
            '-H:+SharedLibrary',
            "-H:TempDirectory=${libDir.absolutePath}",
            '-H:Name=usercode',
            '-H:+AddAllCharsets',
            '-H:-DeadlockWatchdogExitOnTimeout',
            '-H:DeadlockWatchdogInterval=0',
            '-H:+RemoveSaturatedTypeFlows',
            '-H:-SpawnIsolates',
            '-H:PageSize=16384',
            '-H:EnableURLProtocols=http,https,jar',
            '-H:+PrintAnalysisCallTree',
            '-H:Log=registerResource:',
            '-Djdk.internal.lambda.eagerlyInitialize=false',
            '-H:+ReportExceptionStackTraces',
            '-Dsvm.targetName=iOS',
            '-Dsvm.targetArch=arm64',
            '-H:CompilerBackend=lir',
            '-Dsvm.platform=org.graalvm.nativeimage.Platform$IOS_AARCH64',
            '--no-fallback',
            libJGLIOSMainClass()
        ]

        if (enableMonitoring) {
            args.add(args.size() - 1, '--enable-monitoring=heapdump,jfr')
        }
        if (limitModules) {
            args.add(args.size() - 1, "--limit-modules=${limitModules}")
        }
        if (includeResources) {
            args.add(args.size() - 1, "-H:IncludeResources=${includeResources}")
        }

        def environment = [SDKROOT: sdkPath, CC: clangPath, CXX: clangxxPath]

        if (useCapCache) {
            def argsWithCap = new ArrayList<String>(args)
            argsWithCap.add('-H:+UseCAPCache')
            argsWithCap.add("-H:CAPCacheDir=${graalSimulatorCapDir.absolutePath}")
            try {
                runCommand(argsWithCap, environment, libDir)
            } catch (GradleException capFailure) {
                if (!capFailure.message.contains('Missing CAP cache value for:')) {
                    throw capFailure
                }
                logger.warn('CAP cache mismatch detected; retrying native-image without CAP cache.')
                runCommand(args, environment, libDir)
            }
        } else {
            println 'CAP cache disabled for this build (-PiosGraalUseCapCache=false).'
            runCommand(args, environment, libDir)
        }
    }
}

tasks.register('archiveIosSimulatorUsercode') {
    group = 'build'
    description = 'Archives the newest Graal iOS simulator usercode.o into usercode.a.'
    dependsOn 'buildIosSimulatorUsercode'
    outputs.file(graalSimulatorLibDir.map { it.file('usercode.a') })

    doLast {
        def libDir = graalSimulatorLibDir.get().asFile
        def svmDir = libDir.listFiles()?.findAll { it.isDirectory() && it.name.startsWith('SVM-') }?.max { it.lastModified() }
        if (svmDir == null) {
            throw new GradleException("Could not find SVM-* directory under ${libDir}")
        }
        def usercodeObject = new File(svmDir, 'usercode.o')
        if (!usercodeObject.exists()) {
            throw new GradleException("Could not find usercode.o under ${svmDir}")
        }
        def archiveFile = new File(libDir, 'usercode.a')
        delete archiveFile
        runCommand(['ar', '-r', archiveFile.absolutePath, usercodeObject.absolutePath])
        if (!archiveFile.exists()) {
            throw new GradleException("usercode.a was not created: ${archiveFile}")
        }
        println "Archived Graal simulator usercode: ${archiveFile}"
    }
}

tasks.register('buildIosSimulatorApp', Exec) {
    group = 'build'
    description = 'Links the native simulator shell with Graal usercode.a and iOS runtime libs into a runnable simulator .app.'
    dependsOn 'archiveIosSimulatorUsercode', 'generateLibJGLIOSSimulatorInfoPlist'
    inputs.files(
        graalSimulatorInfoPlist,
        sourceSets.main.runtimeClasspath,
        graalSimulatorLibDir,
        graalSimulatorRuntimeDir
    )
    outputs.file(graalSimulatorExecutable)

    doFirst {
        def appDir = graalSimulatorAppDir.get().asFile
        copy {
            from graalSimulatorInfoPlist
            into appDir
        }
    }

    def sdkPath = providers.provider { libJGLIOSXcrun(['--sdk', 'iphonesimulator', '--show-sdk-path']) }
    def clangPath = providers.provider { libJGLIOSXcrun(['--sdk', 'iphonesimulator', '--find', 'clang++']) }

    doFirst {
        def resolved = resolveIosGraalVm()
        def archiveFile = graalSimulatorLibDir.get().file('usercode.a').asFile
        def weakJniStubs = libJGLIOSGenerateWeakJniStubs(archiveFile, new File(temporaryDir, 'weak-jni-stubs.cpp'))
        def frameworkResolution = libJGLIOSResolveIosFrameworks('simulator', graalSimulatorAppDir.get().asFile)
        def args = [
            clangPath.get(),
            '-target', libJGLIOSSimulatorTargetTriple(),
            '-isysroot', sdkPath.get(),
            '-std=c++17',
            '-fobjc-arc',
            '-DGL_GLEXT_PROTOTYPES=1',
            '-DEGL_EGLEXT_PROTOTYPES=1',
            '-I', file('src/main/native').absolutePath,
            '-I', new File(resolved.home, 'include').absolutePath,
            '-I', new File(resolved.home, 'include/darwin').absolutePath,
            '-F', frameworkResolution.frameworksDir.absolutePath,
            '-rpath', '@executable_path/Frameworks',
            weakJniStubs.absolutePath,
            "-Wl,-force_load,${archiveFile.absolutePath}",
            graalSimulatorLibJava.absolutePath,
            graalSimulatorLibJvm.absolutePath
        ]
        args.addAll(libJGLIOSFrameworkLinkArgs(frameworkResolution))
        args.addAll(['-o', graalSimulatorExecutable.get().asFile.absolutePath])
        commandLine(args)
    }

    doLast {
        runCommand(['codesign', '--force', '--sign', '-', graalSimulatorAppDir.get().asFile.absolutePath])
    }
}

