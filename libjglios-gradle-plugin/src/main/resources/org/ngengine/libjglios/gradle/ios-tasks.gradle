                throw capFailure
            }
            logger.warn('Device CAP cache mismatch detected; retrying native-image without CAP cache.')
            runCommand(args, environment, libDir)
        }
    }
}

tasks.register('archiveUsercode') {
    group = 'build'
    description = 'Archives the newest Graal iOS app usercode.o into usercode.a.'
    dependsOn 'buildUsercode'
    outputs.file(graalDeviceLibDir.map { it.file('usercode.a') })

    doLast {
        def libDir = graalDeviceLibDir.get().asFile
        def svmDir = libDir.listFiles()?.findAll { it.isDirectory() && it.name.startsWith('SVM-') }?.max { it.lastModified() }
        if (svmDir == null) {
            throw new GradleException("Could not find SVM-* directory under ${libDir}")
        }
        def usercodeObject = new File(svmDir, 'usercode.o')
        if (!usercodeObject.exists()) {
            throw new GradleException("Could not find usercode.o under ${svmDir}")
        }
        def archiveFile = new File(libDir, 'usercode.a')
        delete archiveFile
        runCommand(['ar', '-r', archiveFile.absolutePath, usercodeObject.absolutePath])
        if (!archiveFile.exists()) {
            throw new GradleException("device usercode.a was not created: ${archiveFile}")
        }
        println "Archived Graal device usercode: ${archiveFile}"
    }
}

tasks.register('linkApp', Exec) {
    group = 'build'
    description = 'Links the iOS app for real devices.'
    dependsOn 'archiveUsercode', 'generateLibJGLIOSInfoPlist'
    inputs.files(
        graalDeviceInfoPlist,
        sourceSets.main.runtimeClasspath,
        graalDeviceLibDir,
        graalDeviceRuntimeDir
    )
    outputs.file(graalDeviceExecutable)

    doFirst {
        def appDir = graalDeviceAppDir.get().asFile
        copy {
            from graalDeviceInfoPlist
            into appDir
        }
    }

    def sdkPath = providers.provider { libJGLIOSXcrun(['--sdk', 'iphoneos', '--show-sdk-path']) }
    def clangPath = providers.provider { libJGLIOSXcrun(['--sdk', 'iphoneos', '--find', 'clang++']) }

    doFirst {
        def resolved = resolveIosGraalVm()
        def archiveFile = graalDeviceLibDir.get().file('usercode.a').asFile
        def weakJniStubs = libJGLIOSGenerateWeakJniStubs(archiveFile, new File(temporaryDir, 'weak-jni-stubs.cpp'))
        def frameworkResolution = libJGLIOSResolveIosFrameworks('device', graalDeviceAppDir.get().asFile)
        def args = [
            clangPath.get(),
            '-target', libJGLIOSDeviceTargetTriple(),
            '-isysroot', sdkPath.get(),
            '-std=c++17',
            '-fobjc-arc',
            '-DGL_GLEXT_PROTOTYPES=1',
            '-DEGL_EGLEXT_PROTOTYPES=1',
            '-I', new File(resolved.home, 'include').absolutePath,
            '-I', new File(resolved.home, 'include/darwin').absolutePath,
            '-F', frameworkResolution.frameworksDir.absolutePath,
            '-rpath', '@executable_path/Frameworks',
            weakJniStubs.absolutePath,
            "-Wl,-force_load,${archiveFile.absolutePath}",
            graalDeviceLibJava.absolutePath,
            graalDeviceLibJvm.absolutePath
        ]
        args.addAll(libJGLIOSFrameworkLinkArgs(frameworkResolution))
        args.addAll(['-o', graalDeviceExecutable.get().asFile.absolutePath])
        commandLine(args)
    }

}

tasks.register('buildIosApp') {
    group = 'build'
    description = 'Builds and signs the iOS app for real devices.'
    dependsOn 'linkApp'
    inputs.dir(graalDeviceAppDir)
    inputs.property('iosSigningIdentity', providers.provider { libJGLIOSIosDeviceSigningIdentity() })
    inputs.property('iosProvisioningProfile', providers.provider { libJGLIOSIosDeviceProvisioningProfile() ?: '' })
    inputs.property('iosCodesignEntitlements', providers.provider { libJGLIOSIosDeviceEntitlements() ?: '' })

    doLast {
        def appDir = graalDeviceAppDir.get().asFile
        def provisioningProfilePath = libJGLIOSIosDeviceProvisioningProfile()
        if (provisioningProfilePath) {
            def provisioningProfile = file(provisioningProfilePath)
            if (!provisioningProfile.isFile()) {
                throw new GradleException("Configured iOS provisioning profile does not exist: ${provisioningProfile}")
            }
            copy {
                from provisioningProfile
                into appDir
                rename { 'embedded.mobileprovision' }
            }
        }
        def signingIdentity = libJGLIOSIosDeviceSigningIdentity()
        def nestedCodeItems = []
        appDir.eachFileRecurse(FileType.DIRECTORIES) { item ->
            if (item.name.endsWith('.framework') || item.name.endsWith('.appex')) {
                nestedCodeItems.add(item)
            }
        }
        appDir.eachFileRecurse(FileType.FILES) { item ->
            if (item.name.endsWith('.dylib')) {
                nestedCodeItems.add(item)
            }
        }
        nestedCodeItems.sort { -it.absolutePath.count(File.separator) }.each { signedItem ->
            runCommand(['codesign', '--force', '--sign', signingIdentity, '--timestamp=none', signedItem.absolutePath])
        }

        def codesignArgs = ['codesign', '--force', '--sign', signingIdentity, '--timestamp=none', '--generate-entitlement-der']
        def entitlementsPath = libJGLIOSIosDeviceEntitlements()
        if (entitlementsPath) {
            def entitlements = file(entitlementsPath)
            if (!entitlements.isFile()) {
                throw new GradleException("Configured iOS codesign entitlements file does not exist: ${entitlements}")
            }
            codesignArgs.addAll(['--entitlements', entitlements.absolutePath])
        }
        codesignArgs.add(appDir.absolutePath)
        runCommand(codesignArgs)

    }
}

tasks.register('packageApp', Zip) {
    group = 'build'
    description = 'Packages the iOS app as a zip.'
    dependsOn 'buildIosApp'
    archiveFileName = graalDevicePackage.get().asFile.name
    destinationDirectory = graalDevicePackage.get().asFile.parentFile
    from(graalDeviceAppDir)
}

tasks.register('runIosApp') {
    group = 'verification'
    description = 'Builds, installs, and launches the iOS app. Uses a connected real device when available; otherwise opens the simulator.'
    dependsOn {
        libJGLIOSIosAppRunTarget().kind == 'device' ? 'buildIosApp' : 'buildIosSimulatorApp'
    }

    doLast {
        def target = libJGLIOSIosAppRunTarget()
        if (target.kind == 'device') {
            libJGLIOSRunIosAppOnDevice(target)
        } else {
            libJGLIOSRunIosAppOnSimulator()
        }
    }
}
