}

tasks.register('buildIosApp') {
    group = 'build'
    description = 'Builds a release iOS IPA for App Store upload.'
    dependsOn 'verifyIosReleaseSigning', 'linkApp'
    inputs.dir(graalDeviceAppDir)
    inputs.property('iosReleaseSigningIdentity', providers.provider { libJGLIOSSigningIdentity('release')?.sign ?: '' })
    inputs.property('iosReleaseProvisioningProfile', providers.provider { libJGLIOSProvisioningProfile('release') ?: '' })
    inputs.property('iosReleaseCodesignEntitlements', providers.provider { libJGLIOSEntitlements('release') ?: '' })
    outputs.file(graalReleaseIpa)

    doLast {
        def payloadDir = graalReleasePayloadDir.get().asFile
        def appDir = graalReleaseAppDir.get().asFile
        def ipa = graalReleaseIpa.get().asFile
        delete graalReleaseBuildDir.get().asFile
        payloadDir.mkdirs()
        libJGLIOSCopyLinkedDeviceApp(appDir)
        libJGLIOSSignAppBundle(appDir, 'release')
        delete ipa
        runCommand(['/usr/bin/zip', '-qry', ipa.absolutePath, 'Payload'], [:], graalReleaseBuildDir.get().asFile)
        if (!ipa.isFile()) {
            throw new GradleException("iOS IPA was not created: ${ipa}")
        }
        println "Built iOS release IPA: ${ipa.absolutePath}"
    }
}

tasks.register('runIosDebugApp') {
    group = 'verification'
    description = 'Builds, installs, and launches the debug iOS app. Uses a connected real device when available; otherwise opens the simulator.'
    dependsOn {
        libJGLIOSIosAppRunTarget().kind == 'device' ? 'buildIosDebugApp' : 'buildIosSimulatorApp'
    }

    doLast {
        def target = libJGLIOSIosAppRunTarget()
        if (target.kind == 'device') {
            libJGLIOSRunIosAppOnDevice(target)
        } else {
            libJGLIOSRunIosAppOnSimulator()
        }
    }
}
